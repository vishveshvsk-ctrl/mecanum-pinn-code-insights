# base.toml — shared settings common to all profiles, coherent with the notebook
# `Mecanum_SlipSpinLuGre_ASMC_DOB_full_supertwist.ipynb`. Mirrors the PARAMETERS
# cell, the PlatformParams cell, and the solver settings inside run_one_chi.
# DOB / disturbance-observer parameters are deliberately EXCLUDED (they live in the
# notebook's DOB config block, not here).
#
# mu_friction and chi are FIXED here for now (single demo run). To sweep them later,
# replace the scalars under [physics] with lists and have the driver loop over them.

[physics]
mu_friction   = 0.5          # Coulomb friction coefficient (PlatformParams f_coulomb)
chi           = 0.005        # roller contact-spot radius (m); was train_chi_values[1]
friction_case = 1            # 1 = standard viscous (p1=0.11, p2=5.78e-3),
                             # 2 = low viscous (p1=0.011, p2=5.78e-4)

# Platform geometry, masses, inertias — mirror of PlatformParams(; mu_friction).
# These let a config consumer reconstruct the plant without hard-coding; the notebook
# still builds PlatformParams() directly, so these are authoritative reference values.
[platform.geometry]
h  = 0.235                   # half-length (m)
l  = 0.15                    # half-width (m)
R  = 0.05                    # wheel outer radius (m)
Ra = 0.0355                  # roller axle distance (m)

[dob]
enable = false

[platform.mass]
m        = 30.0              # platform mass (kg)
m_wheel  = 1.4               # per-wheel mass (kg)
J_wheel  = 5.87e-3           # wheel inertia (kg m^2)
J_roller = 1.0e-6            # roller inertia (kg m^2)
Is       = 4.42              # platform moment of inertia about OZ (kg m^2)
# ms = m + 4*m_wheel = 35.6 (derived); N_total = m*9.81 = 294.3 N (derived)

[platform.com_offset]
aX = 1.6e-2                  # COM offset X (m)
aY = -2.6e-2                 # COM offset Y (m)

[platform.viscous]           # wheel-base joint viscous friction (selected by friction_case)
p1_case1 = 0.11              # drivetrain (N m s)
p2_case1 = 5.78e-3           # roller bearing (N m s)
p1_case2 = 0.011             # low-viscous ablation
p2_case2 = 5.78e-4

[platform.contact]
rollers_per_wheel = 12
Max_torque        = 10.0     # per-wheel actuator torque cap (N m)
# O-configuration roller angles delta = [-pi/4, pi/4, pi/4, -pi/4];
# wheel centers wc_x = [h,h,-h,-h], wc_y = [l,-l,l,-l]  (see PlatformParams).

# ---------------------------------------------------------------------------
# Solver — EXACT match to run_one_chi's solve(...) call and the ABSTOL vector.
# ---------------------------------------------------------------------------
[solver]
name    = "FBDF"           # run_one_chi default solver (stiff). RadauIIA5/Rodas5P
                            # are alternatives but TRBDF2 is what the notebook runs.
reltol  = 1.0e-9
dtmax   = 0.001
maxiters = 10_000_000        # 10^7
# saveat is a DENSE uniform grid, not a scalar step: t_eval = range(0, T; length =
# round(Int, T_total*2000 + 1)). i.e. 2000 samples per second of T_total. The driver
# builds this from CURRENT_REF[].T_total; saveat_rate below is that 2000 Hz factor.
saveat_rate = 2000           # samples per second (t_eval length = T_total*saveat_rate + 1)

# Per-group ABSOLUTE tolerances for the 39-D state, in state order. The solver receives
# the flat 39-vector ABSTOL = concat of these groups with the listed counts. Mirrors the
# _AT named-tuple + ABSTOL construction in the notebook EXACTLY.
#   state layout: [1:3] body vel | [4] psi | [5:8] theta | [9:12] omega | [13:16] gamma
#                 | [17:19] gains | [20:21] world pos | [22:29] bristle | [30:33] bristle_rot
#                 | [34:36] observer | [37:39] dist_est
[solver.abstol]
body_vel    = 1.0e-8         # [1:3]   Vx, Vy, psi_dot      (count 3)
psi         = 1.0e-7         # [4]     psi                  (count 1)
wtheta      = 1.0e-8         # [5:8]   theta_1..4           (count 4)
womega      = 1.0e-7         # [9:12]  omega_1..4           (count 4)
gamma       = 1.0e-7         # [13:16] gamma_1..4           (count 4)
gains       = 1.0e-7         # [17:19] K_x, K_y, K_psi      (count 3)
worldpos    = 1.0e-7         # [20:21] x_o, y_o             (count 2)
bristle     = 1.0e-10        # [22:29] zx, zy linear bristle(count 8)
bristle_rot = 1.0e-7         # [30:33] zs rotational bristle(count 4)
observer    = 1.0e-7         # [34:36] zeta / v_hat         (count 3)
dist_est    = 1.0e-7         # [37:39] delta_hat            (count 3)
# Flat ABSTOL = vcat of each group repeated by its count, in the order above.
# counts: 3 + 1 + 4 + 4 + 4 + 3 + 2 + 8 + 4 + 3 + 3 = 39 (full 39-D state).
# Explicit counts so the driver can rebuild the vector without hard-coding:
[solver.abstol_counts]
body_vel = 3
psi = 1
wtheta = 4
womega = 4
gamma = 4
gains = 3
worldpos = 2
bristle = 8
bristle_rot = 4
observer = 3
dist_est = 3
