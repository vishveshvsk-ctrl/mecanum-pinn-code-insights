builder = "octagon"

[profile.params]            # fixed (structural / accel-irrelevant)
n_sides    = 8
dwell_frac = 0.10
T_period   = 10.0

[profile.sweep]             # independent random pick; does NOT affect accel magnitude
psi_des_deg = [0.0, 90.0]   # held platform heading

