# Octagon — start-cruise-stop body-velocity legs in 8 directions. Each leg is a
# jerk-smooth quintic velocity pulse (0 -> vcru -> hold -> 0) along the leg
# direction. ONE builder spans BOTH motion classes via lat_vamp:
#   lat_vamp = 0           -> PURE LINEAR translation (clean start-stop-go, no wiggle)
#   lat_vamp > 0           -> translation + lateral sine wiggle (n_waves cycles/cruise)
# Heading is held fixed (psi_des = psi_des_deg, Omega = 0).
#
# ACCELERATION SAFETY unchanged from the 103-row version: peak longitudinal
# accel < 1.66 m/s^2, peak lateral accel < 1.05 m/s^2 (friction-circle limits
# at N_min, 10% band). theta0 rotation is gate-irrelevant (heading constant ->
# relative leg angle covered; budgets frame-invariant at the wheel level only
# through psi, which is unchanged).
#
# 309 rows = 103 base rows x theta0_deg in {0, 15, 30}, BLOCK-WISE:
#   combo 1..103 -> theta0=0,  104..206 -> 15,  207..309 -> 30
#   (base row of combo i is ((i-1) mod 103) + 1 of the original file).
# theta0_deg PROMOTED from sweep to combos (deterministic, filename-unique via
# combo_idx); psi_des_deg stays a sweep covariate (random per job, recorded in
# traj_cfg) since heading is constant and only the relative angle matters.

