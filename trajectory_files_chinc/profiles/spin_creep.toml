# Spin creep — slow translational creep + 2 scheduled HIGH yaw-rate pulses. Yaw-
# dominant profile: low |V| frees the wheel-SPEED budget for large |Omega| (yaw is
# torque-rich but rate-poor; lever L_psi=R/(l+h)=0.13 -> yaw RATE is the bottleneck).
# Heading psi_des is the running integral of the pulse train; the degree-2 yaw
# surface tracks it.
#
# EACH PULSE is a yaw-rate trapezoid: ramp 0->yawr (tu), hold (th), ramp ->0 (td),
# rest at 0 (tdwell). Rate returns to zero between pulses (no stacking). 2 pulses is
# sufficient: a pulse only adds a yaw-rate excursion + return; beyond the first two
# (one event + one transition to a different value) more pulses are pure repetition.
# 2 pulses also restores INTERNAL symmetry — an alternating [+,-] run is itself
# sign-balanced (net heading ~0), which an odd count cannot do. Durations 19-25 s.
#
# BINDING CONSTRAINT: |Omega| < 0.90*3.5 = 3.15 rad/s (10% band); peak 3.1, under.
# Yaw accel from ramps (yawr*1.875/tu, up to ~5.8 at tu=1.0) is torque-feasible,
# NOT binding. tu is the yaw-ACCEL coverage knob. Coupling Omega*v_creep <= 0.155
# m/s^2 << 1.05 lateral.
#
# STRUCTURE: pure index-based lookup. Parallel arrays, all length 432; yaw_spin is
# list-valued (each entry a 2-pulse schedule). Notebook picks ONE ROW INDEX.
#
# SIGN COVERAGE: 12 sign-mirrored schedules give net rotation 144+/144-/144~0
# (perfectly balanced) and 288 runs exercising both signs internally.
[profile]
builder = "spin_creep"

[profile.params]            # fixed timing / startup (builder defaults td = tu)
th       = 4.0
tdwell   = 2.0
T_pre    = 3.0
Twarp    = 2.0
psi0_deg = 0.0

[profile.combos]            # pick ONE INDEX; parallel arrays, all length 432.
                            # yaw_spin column is array-of-arrays (2-pulse schedule per row).
