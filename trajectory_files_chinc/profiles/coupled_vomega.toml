# Coupled V-Omega excitation (ex-"spiral") — independent |V| and Omega profiles, each either "const" (held, on/off
# ramped at the trajectory edges) or "ramp" (a single bump in the middle). This is
# the ONLY profile with SIMULTANEOUS translational + yaw acceleration, so the
# friction circle is a true 2D vector budget, not a per-axis or time-disjoint one.
#
# THREE KINDS (full V/Omega-plane coverage), 36 each before sign-mirror:
#   Vr_Oc: V-ramp, Om-const  (sweep |V| accel against a held low spin)
#   Vc_Or: V-const, Om-ramp  (held speed, sweep the yaw bump)
#   Vr_Or: both-ramp         (synchronized — rides a (V,Omega) ray; richest coupling)
#
# CONSTRAINTS (every row pre-validated with per-axis, elliptical, AND combined-force checks):
#   body accel a_x = dV/dt - Omega*Vy, a_y = dV/dt + Omega*Vx (the Omega*V coupling
#   is the centripetal-like normal term, worst in Vr_Or when bumps overlap).
#   per-axis: |a_long| < 0.90*1.84 = 1.66, |a_lat| < 0.90*1.17 = 1.05 m/s^2
#   ellipse:  (a_long/1.84)^2 + (a_lat/1.17)^2 < 0.90  (the 2D linear friction circle)
#   COMBINED PER-WHEEL FORCE: linear-accel force (m_tilde*|a|) PLUS yaw-accel torque
#   demand (I_psi*|alpha|/(l+h)) summed at each wheel < 0.90*mu*N_min = 37.6 N. This
#   is the fundamental friction-circle check and is the one that accounts for the YAW
#   ANGULAR ACCELERATION alpha=dOmega/dt (a torque demand, distinct from linear accel).
#   Worst combined wheel force across all rows is 36.7% of mu*N_min (yaw-accel adds
#   only ~3% since spiral's Omega ramps are gentle; yaw is torque-rich, lever l+h=0.385).
#   |V| < 4.0 m/s ; |Omega| < 0.90*3.5 = 3.15 rad/s.
# Body orientation delta_deg rotates which axis the coupling loads, so the ellipse
# is evaluated over the actual (a_long,a_lat) trajectory. Ellipse coverage spans
# 0.16 -> 0.82 (36 high-load combos >0.6 probe the friction-circle boundary).
#
# SIGN: Om coefficients are sign-mirrored (+/-) for yaw-direction balance; both
# integral paths (ramp and const) scale linearly with the Om coefficient.
#
# STRUCTURE: pure index-based lookup. Parallel arrays, all length 216; V_mode and
# Om_mode are STRING columns. Notebook picks ONE ROW INDEX. Fixed 22 s duration.
[profile]
builder = "coupled_vomega"

[profile.params]            # fixed timing (bump centered, edges ramped)
Twarp   = 2.0
bump_t0 = 4.0
bump_tu = 4.0
bump_th = 6.0
bump_td = 4.0
T_total = 22.0             # fixed 22 s for all rows
psi0_deg = 0.0
# NOTE: no min_heading_deg here (builder supports it, default 0 = off). Heading-
# sweep floors belong to spiral_orbit; for this profile they only added
# low-value spin-in-place tails to the *_Oc rows.

[profile.combos]            # pick ONE INDEX; parallel arrays, all length 216
